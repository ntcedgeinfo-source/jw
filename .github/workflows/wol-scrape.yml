name: Scrape JW WOL (Cebuano)

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 01:00 UTC (adjust as you like)
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        env:
          TARGET_URL: https://wol.jw.org/ceb/wol/h/r101/lp-cv
          OUT_DIR: data
          TIMEOUT: "30"
          RETRIES: "5"
        run: |
          python scripts/scrape_wol.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wol-scrape-output
          path: data/

      # OPTIONAL: Commit results back to repo
      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "Update WOL scrape output"
          git push
