name: Scrape WOL DT JSON (requests-only)

on:
  workflow_dispatch:
  schedule:
    - cron: "5 16 * * *" # 00:05 Asia/Manila

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Compute date in Asia/Manila
        id: date
        run: |
          python -c "from datetime import datetime; from zoneinfo import ZoneInfo; d=datetime.now(ZoneInfo('Asia/Manila')); print(f'YEAR={d.year}'); print(f'MONTH={d.month}'); print(f'DAY={d.day}')" >> "$GITHUB_OUTPUT"

      - name: Run scrape (requests only)
        env:
          YEAR: ${{ steps.date.outputs.YEAR }}
          MONTH: ${{ steps.date.outputs.MONTH }}
          DAY: ${{ steps.date.outputs.DAY }}
          OUT_DIR: data
          TIMEOUT: "45"
          RETRIES: "8"
        run: |
          python scripts/scrape_wol_dt_requests.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wol-dt-requests-${{ steps.date.outputs.YEAR }}-${{ steps.date.outputs.MONTH }}-${{ steps.date.outputs.DAY }}
          path: data/
