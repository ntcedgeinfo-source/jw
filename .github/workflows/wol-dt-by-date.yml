name: Scrape WOL DT JSON (auto)

on:
  workflow_dispatch:
  schedule:
    - cron: "5 16 * * *"   # 00:05 Asia/Manila

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Compute Manila date
        id: date
        run: |
          python -c "from datetime import datetime; from zoneinfo import ZoneInfo; d=datetime.now(ZoneInfo('Asia/Manila')); print(f'YEAR={d.year}'); print(f'MONTH={d.month}'); print(f'DAY={d.day}')" >> "$GITHUB_OUTPUT"

      - name: Run scraper
        env:
          YEAR: ${{ steps.date.outputs.YEAR }}
          MONTH: ${{ steps.date.outputs.MONTH }}
          DAY: ${{ steps.date.outputs.DAY }}
          OUT_DIR: data
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_EMAIL: "1"
          BLOGGER_POST_EMAIL: ${{ secrets.BLOGGER_POST_EMAIL }}

          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          # If inputs are empty (scheduled run), set YEAR/MONTH/DAY to Manila "today"
          if [ -z "$YEAR" ] || [ -z "$MONTH" ] || [ -z "$DAY" ]; then
            YEAR=$(TZ=Asia/Manila date +%Y)
            MONTH=$(TZ=Asia/Manila date +%-m)
            DAY=$(TZ=Asia/Manila date +%-d)
            export YEAR MONTH DAY
          fi
          python scripts/scrape_wol_dt_requests.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wol-dt-${{ steps.date.outputs.YEAR }}-${{ steps.date.outputs.MONTH }}-${{ steps.date.outputs.DAY }}
          path: data/
